plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.sheptnative'
version = '0.7.9'

android {
  namespace "expo.modules.sheptnative"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation "androidx.security:security-crypto:1.1.0-alpha06"
}
